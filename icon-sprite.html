<!--

  curves — reads as pixel-inspired without a literal bitmap). Paste this
  block once near the top of <body> on any page that uses <svg class="pixel-icon"><use href="#pi-name"/></svg>.
-->

      <rect x="11" y="7" width="2" height="2"></rect>
